<div class="auth-container">
  <div class="glass-panel auth-card">
    <div class="auth-header">
      <h1>The Staircase</h1>
      <p class="subtitle">From Vision to Victory, One Step at a Time.</p>
    </div>

    <div class="auth-body">
      <button class="btn-primary google-btn" (click)="loginWithGoogle()" [disabled]="isLoading">
        @if (!isLoading) {
          <span>Sign in with Google</span>
        } @else {
          <span>Signing in...</span>
        }
      </button>

      @if (errorMsg) {
        <p class="error-msg" role="alert">{{ errorMsg }}</p>
      }
    </div>
  </div>
</div>
