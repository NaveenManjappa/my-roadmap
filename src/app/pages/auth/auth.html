<div class="auth-container">
  <div class="glass-panel auth-card">
    <div class="auth-header">
      <h1>The Staircase</h1>
      <p class="subtitle">From Vision to Victory, One Step at a Time.</p>
    </div>

    <div class="auth-body">
      <button class="btn-primary google-btn" (click)="loginWithGoogle()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign in with Google</span>
        <span *ngIf="isLoading">Signing in...</span>
      </button>
      
      <p *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</p>
    </div>
  </div>
</div>
